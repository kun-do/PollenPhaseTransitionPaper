# Portable environment spec for the repository workflows.
# Conda will choose the platform-specific runtimes when the environment is created.
name: pollen-main
channels:
  - conda-forge
dependencies:
  # Core plotting and post-processing.
  - python>=3.11,<3.13
  - numpy
  - scipy
  - matplotlib

  # Conserved-dynamics workflow.
  - fipy

  # C++ equilibrium solver build support.
  - cmake>=3.16
  - eigen

# Install a platform-native C++ compiler separately if you want to build the solvers.
